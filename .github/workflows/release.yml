name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package .vsix
        run: cd extension && npm run vsix

      # Publish steps are independent: continue-on-error means a benign failure on
      # one registry (e.g. re-tagging an already-published version) never blocks the
      # other publish or the GitHub Release. Build/test failures above still halt the
      # pipeline before we reach here, so we never publish an untested build.
      - name: Publish to VS Code Marketplace
        id: vsce
        continue-on-error: true
        # Publish the already-packaged .vsix so the tested artifact is what lands on
        # the Marketplace (not a fresh rebuild from source).
        run: npx @vscode/vsce publish --packagePath extension/large-file-compare-*.vsix --pat ${{ secrets.VSCE_PAT }}

      - name: Ensure Open VSX namespace exists
        continue-on-error: true
        run: npx ovsx create-namespace AdityaKumar0406 --pat ${{ secrets.OVSX_PAT }}

      - name: Publish to Open VSX Registry
        id: ovsx
        continue-on-error: true
        run: npx ovsx publish extension/large-file-compare-*.vsix --pat ${{ secrets.OVSX_PAT }}

      # Surface each registry's outcome in the run summary, since continue-on-error
      # keeps the job green — check here (or the listings) to confirm a publish landed.
      - name: Publish summary
        run: |
          echo "| Registry | Outcome |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| VS Code Marketplace | ${{ steps.vsce.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Open VSX | ${{ steps.ovsx.outcome }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: extension/*.vsix

  # ---------------------------------------------------------------------------
  # JetBrains plugin: build on every tag, publish only when secrets are wired.
  # To enable publishing: add PUBLISH_TOKEN, CERTIFICATE_CHAIN, PRIVATE_KEY,
  # and PRIVATE_KEY_PASSWORD to the repository secrets. The publish step is a
  # no-op (not a failure) when PUBLISH_TOKEN is absent.
  # ---------------------------------------------------------------------------
  release-jetbrains:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup JDK 21 (temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JetBrains plugin
        run: cd jetbrains && ./gradlew buildPlugin

      - name: Publish JetBrains plugin
        # continue-on-error keeps the workflow green on benign failures (e.g.
        # re-publishing an already-released version). The inner shell guard
        # makes the step a silent no-op when PUBLISH_TOKEN is not yet set,
        # so CI passes without any secrets configured.
        continue-on-error: true
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$PUBLISH_TOKEN" ]; then
            echo "PUBLISH_TOKEN secret not configured — skipping JetBrains Marketplace publish."
            echo "Add PUBLISH_TOKEN (and optionally CERTIFICATE_CHAIN / PRIVATE_KEY / PRIVATE_KEY_PASSWORD) to repository secrets to enable."
            exit 0
          fi
          cd jetbrains && ./gradlew publishPlugin

  # ---------------------------------------------------------------------------
  # Eclipse plugin: Tycho build + upload p2 site artifact.
  # Publishing to GitHub Pages (or another host) is a manual follow-up step —
  # this job only builds and preserves the artifact.
  # ---------------------------------------------------------------------------
  release-eclipse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup JDK 17 (temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Eclipse plugin (Tycho)
        run: cd eclipse && mvn -B package

      - name: Upload Eclipse p2 update site
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-p2-site
          path: eclipse/site/target/repository/
          if-no-files-found: warn
